<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating Shelf - Login</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Inter", "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
      color: #0f172a;
    }

    .login-card {
      width: min(420px, 92vw);
      background: #ffffff;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
      border: 1px solid #e2e8f0;
    }

    h1 {
      margin: 0;
      font-size: 1.6rem;
      font-weight: 700;
    }

    .subtitle {
      margin: 0.5rem 0 1.5rem;
      color: #475569;
      font-size: 0.95rem;
    }

    .field {
      display: grid;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #1e293b;
    }

    input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 0.75rem 0.8rem;
      font-size: 0.95rem;
      outline: none;
    }

    input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.18);
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      background: #4f46e5;
      color: #fff;
      padding: 0.8rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
    }

    button:hover {
      background: #4338ca;
    }

    .error {
      min-height: 1.2rem;
      margin-top: 0.85rem;
      color: #dc2626;
      font-size: 0.85rem;
    }
  </style>
  <script src="auth.js"></script>
</head>
<body>
  <main class="login-card" aria-labelledby="loginTitle">
    <h1 id="loginTitle">Floating Shelf</h1>
    <p class="subtitle">Please sign in to access the dashboard.</p>

    <form onsubmit="event.preventDefault(); login();">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>

      <button type="submit">Login</button>
      <p class="error" id="errorMessage" role="alert" aria-live="polite"></p>
    </form>
  </main>
</body>
</html>
