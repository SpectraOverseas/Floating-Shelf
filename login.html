<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating Shelf - Login</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Inter", "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: #0f172a;
    }

    .login-card {
      width: min(360px, 92vw);
      background: #ffffff;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      color: #1e293b;
    }

    .subtitle {
      margin: 0.5rem 0 1.5rem;
      color: #64748b;
      font-size: 0.95rem;
    }

    .field {
      display: grid;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #1e293b;
    }

    input {
      width: 100%;
      height: 44px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 0 0.8rem;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      height: 44px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
    }

    .error {
      min-height: 1.2rem;
      margin-top: 0.85rem;
      color: #dc2626;
      font-size: 0.85rem;
    }
  </style>
  <script src="auth.js"></script>
</head>
<body>
  <main class="login-card" aria-labelledby="loginTitle">
    <h1 id="loginTitle">Floating Shelf</h1>
    <p class="subtitle">Please sign in to access the dashboard.</p>

    <form onsubmit="event.preventDefault(); login();">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>

      <button type="submit">Login</button>
      <p class="error" id="errorMessage" role="alert" aria-live="polite"></p>
    </form>
  </main>
</body>
</html>
