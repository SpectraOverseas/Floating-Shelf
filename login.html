<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating Shelf - Login</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Inter", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: "Inter", Arial, sans-serif;
      color: #0f172a;
      padding: 1.5rem;
    }

    .login-card {
      width: 360px;
      background: #ffffff;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      color: #111111;
    }

    .subtitle {
      margin: 0.5rem 0 1.5rem;
      color: #6b7280;
      font-size: 14px;
    }

    .field {
      display: grid;
      gap: 0.4rem;
      margin-bottom: 1.1rem;
    }

    label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #1e293b;
    }

    input {
      width: 100%;
      height: 44px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    input:focus {
      border-color: #000000;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #000000;
      color: #ffffff;
      height: 44px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.6rem;
      transition: background-color 0.2s ease;
    }

    button:hover {
      background: #1f1f1f;
    }

    .error {
      min-height: 1.2rem;
      margin-top: 10px;
      color: #ef4444;
      font-size: 13px;
    }
  </style>
  <script src="auth.js"></script>
</head>
<body onload="checkLoginAuth()">
  <main class="login-card" aria-labelledby="loginTitle">
    <h1 id="loginTitle">Floating Shelf</h1>
    <p class="subtitle">Please sign in to access the dashboard.</p>

    <form onsubmit="event.preventDefault(); login();">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>

      <button type="submit">Login</button>
      <p class="error" id="errorMessage" role="alert" aria-live="polite"></p>
    </form>
  </main>
</body>
</html>
